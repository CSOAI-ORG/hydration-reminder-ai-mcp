name: hydration-reminder-ai-mcp
description: 'Hydration Reminder Ai MCP server. Tools: log water intake, get daily
  hydration, calculate target. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: log_water_intake
  description: Log water/beverage intake. Specify ml directly or use container type
    (glass, bottle, cup, etc.).
  parameters:
  - name: user_id
    type: string
    required: true
  - name: amount_ml
    type: number
    required: false
  - name: drink_type
    type: string
    required: false
  - name: container
    type: string
    required: false
- name: get_daily_hydration
  description: Get today's hydration summary with progress toward target.
  parameters:
  - name: user_id
    type: string
    required: true
  - name: target_ml
    type: number
    required: false
- name: calculate_target
  description: Calculate personalized daily hydration target based on weight, activity,
    and climate.
  parameters:
  - name: weight_kg
    type: number
    required: true
  - name: activity_level
    type: string
    required: false
  - name: climate
    type: string
    required: false
- name: get_hydration_tips
  description: Get hydration tips and advice for specific situations.
  parameters:
  - name: situation
    type: string
    required: false
