name: hydration-reminder-ai-mcp
description: Track water intake, calculate hydration goals based on body weight, and
  send reminder schedules.
version: 1.0.0
tools:
- name: hydration_plan
  description: ''
  parameters:
  - name: weight_kg
    type: number
    required: true
  - name: activity_level
    type: string
    required: true
- name: reminder_schedule
  description: ''
  parameters:
  - name: wake_time
    type: string
    required: true
  - name: sleep_time
    type: string
    required: true
